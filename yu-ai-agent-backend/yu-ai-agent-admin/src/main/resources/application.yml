# 开发环境配置
server:
  port: 8123
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# Spring配置
spring:
  application:
    name: techdoc-ai-admin
  profiles:
    active: druid
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration

  # AI 框架配置 (Spring AI)
  ai:
    dashscope:
      api-key: sk-ws-H.RYLXLME.mEQ7.MEUCIQDW5A1-WSBQIBbgcMFVULr1MInQ00D38-_cdnQzGeaQPQIgIx1BaJwfoVJrMQp16JWQSDUnyHGB6HzApqnDuKswYt8
      chat:
        options:
          model: qwen-plus
    openai:
      base-url: https://api.xiaomimimo.com
      api-key: sk-cr38rymgdw5brzz9xbudjntzv7fkhvmri1t6twbrz9b465e3
      chat:
        options:
          model: mimo-v2.5-pro

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT 配置
jwt:
  secret: TechDocAiAssistantSecretKeyForJWTTokenGeneration2024!
  expiration: 86400000

# 接口文档配置 (Swagger / Knife4j)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yuaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# 智谱 Embedding 配置
zhipu:
  embedding:
    base-url: https://open.bigmodel.cn/api/paas/v4
    api-key: 9bb0f4b7dcc24a11a6938391c2f695e7.gmHjPZjEdnko3rhW
    model: Embedding-3

# 第三方服务配置：搜索API
search-api:
  api-key: 替换为您的API_KEY

# 日志配置
logging:
  level:
    org.springframework.ai: DEBUG
